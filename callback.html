<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIZAVOD - TikTok Authorization</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 500px; margin: 100px auto; padding: 20px; color: #333; text-align: center; }
        .status { font-size: 18px; margin: 20px 0; }
        .code { background: #f0f0f0; padding: 10px 20px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; }
        .error { color: #e94560; }
        .success { color: #28a745; }
    </style>
</head>
<body>
    <h1>AIZAVOD</h1>
    <div id="result"></div>
    <script>
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var error = params.get('error');
        var el = document.getElementById('result');
        if (code) {
            el.innerHTML = '<p class="status success">Authorization successful!</p>' +
                '<p>Your authorization code:</p>' +
                '<div class="code">' + code + '</div>' +
                '<p>Send this code to the bot or it will be processed automatically.</p>';
            fetch('http://72.56.127.52/api/v1/tiktok/callback?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(params.get('state') || ''))
                .catch(function() {});
        } else if (error) {
            el.innerHTML = '<p class="status error">Authorization failed: ' + error + '</p>';
        } else {
            el.innerHTML = '<p class="status">Waiting for authorization...</p>';
        }
    </script>
</body>
</html>
